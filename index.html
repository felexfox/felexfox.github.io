<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>это читают?</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/x-icon" href="/image/favicon.png">
</head>
<body>
    <span class="font-OpenSans centered main-text">
        тут ничего нет и не будет(<span id="maybe">возможно</span>)
    </span>

    <img src="https://cdn.discordapp.com/attachments/1347525354226454530/1347636051191005224/0307.gif?ex=67cc8b60&is=67cb39e0&hm=d5c36fd9acb6e5727896ccaaa72b6dd3229b52fb599b8c377c3ed992c7f0561d&", width="1860", height="980">

    <script>
        var list = ["вероятно", "возможно", "наверно", "может быть", "скорее всего"];
        var nickname = document.getElementById('maybe');
        setInterval(function() {
            var m = 5;
            var n = 0;

            var res;
            do {
                res = Math.floor(Math.random() * (n - m)) + m
            } while (nickname.textContent == list[res]);

            nickname.textContent = list[res];
        }, 2500);
    </script>
</body>
</html>
